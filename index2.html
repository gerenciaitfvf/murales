<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Deportivo Interactivo</title>
    <style>
        /* --- ESTILOS GENERALES Y PARED --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4; /* Color de pared */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wall-container {
            width: 90%;
            max-width: 1200px;
            padding: 40px;
            background-color: #fdfdfd; /* Pared ligeramente más clara */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            position: relative;
        }

        /* Título opcional */
        .wall-title {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- CONTENEDOR DEL MURAL (LA GRILLA) --- */
        .mural-grid {
            display: grid;
            /* Definimos 4 columnas principales */
            grid-template-columns: repeat(5, 1fr);
            /* Definimos 4 filas principales con alturas específicas */
            grid-template-rows: 150px 250px 100px 150px;
            gap: 15px; /* Espacio entre fotos */
        }

        /* --- ESTILOS DE CADA ELEMENTO --- */
        .mural-item {
            background-color: #eee;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777; /* Color para el texto de marcador de posición */
            font-size: 0.8rem;
        }

        /* Efecto al pasar el ratón */
        .mural-item:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10; /* Se pone por delante */
        }

        /* --- ESTILOS ESPECÍFICOS DE LOS MARCOS DE CAMISETAS --- */
        .jersey-frame {
            border: 12px solid #222; /* Marco negro grueso */
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.5);
            background-color: #fafafa;
            padding: 10px;
        }

        /* --- POSICIONAMIENTO DE LOS ELEMENTOS EN LA GRILLA --- */

        /* Columna 1 (Izquierda) */
        .item-1 { grid-column: 1 / 2; grid-row: 1 / 2; } /* Foto de grupo arriba izq */
        .item-2 { grid-column: 1 / 2; grid-row: 2 / 5; } /* Columna larga de fotos */

        /* Columna 2 (Medio-Izquierda) */
        .item-3 { grid-column: 2 / 3; grid-row: 1 / 2; } /* Foto equipo arriba */
        .item-4 { grid-column: 2 / 3; grid-row: 2 / 4; } /* Marco Camiseta Amarilla */
        .item-5 { grid-column: 2 / 3; grid-row: 4 / 5; } /* Foto equipo abajo */

        /* Columna 3 (Medio-Derecha) */
        .item-7 { grid-column: 3 / 4; grid-row: 3 / 4; } /* Foto pequeña playa/piscina */
        .item-8 { grid-column: 3 / 4; grid-row: 4 / 5; } /* Foto pequeña equipo */

        /* Columna 4: Camiseta4 cubre columnas 3-4, encima de FOTO7, FOTO8 y FOTO9 */
        .item-6 { grid-column: 3 / 5; grid-row: 1 / 5; z-index: 5; } /* Marco Camiseta Blanca sobre FOTO7, FOTO8 y FOTO9 */
        .item-f9-1 { grid-column: 4 / 5; grid-row: 1 / 2; }
        .item-f9-2 { grid-column: 4 / 5; grid-row: 2 / 3; }
        .item-f9-3 { grid-column: 4 / 5; grid-row: 3 / 4; }
        .item-f9-4 { grid-column: 4 / 5; grid-row: 4 / 5; }

        /* Columna 5 (Derecha) */
        .item-9 { grid-column: 5 / 6; grid-row: 1 / 2; } /* Foto equipo arriba */
        .item-10 { grid-column: 5 / 6; grid-row: 2 / 3; } /* Jugador de fútbol */
        .item-11 { grid-column: 5 / 6; grid-row: 3 / 5; } /* Edificio */

        /* --- ESTILOS DEL MODAL (PANTALLA COMPLETA) --- */
        .modal {
            display: none; /* Oculto por defecto */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- DETALLES DE PARED (EXTRA) --- */
        .fire-alarm {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 30px;
            height: 30px;
            background-color: #d32f2f;
            border-radius: 50%;
            border: 2px solid #9a0007;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="wall-container">
    <div class="fire-alarm"></div> <h1 class="wall-title">Mural de Recuerdos Deportivos</h1>

    <div class="mural-grid" id="muralGrid">
        <div class="mural-item item-1" style="background-image: url('pared1/FOTO1.png');"><span>[Foto Grupo]</span></div>
        <div class="mural-item item-2" style="flex-direction: column; padding: 0; background: none; cursor: default; gap: 2px;">
            <div style="flex: 1; width: 100%; background: #d4d4d4 url('pared1/FOTO5_1_.png') center/cover no-repeat;"></div>
            <div style="flex: 1; width: 100%; background: #e0e0e0 url('pared1/FOTO5_2_.png') center/cover no-repeat;"></div>
            <div style="flex: 1; width: 100%; background: #d4d4d4 url('pared1/FOTO5_3_.png') center/cover no-repeat;"></div>
            <div style="flex: 1; width: 100%; background: #e0e0e0 url('pared1/FOTO5_4_.png') center/cover no-repeat;"></div>
        </div>

        <div class="mural-item item-3" style="background-image: url('pared1/FOTO2.png');"><span>[Foto Equipo]</span></div>
        <div class="mural-item item-4 jersey-frame" style="background-image: url('pared1/Camiseta6.png');"><span>[Camiseta Amarilla]</span></div>
        <div class="mural-item item-5" style="background-image: url('pared1/FOTO6.png');"><span>[Foto Equipo]</span></div>

        <div class="mural-item item-7" style="background-image: url('pared1/FOTO7.png');"><span>[Foto Pequeña]</span></div>
        <div class="mural-item item-8" style="background-image: url('pared1/FOTO8.png');"><span>[Foto Pequeña]</span></div>

        <div class="mural-item item-f9-1" style="background-image: url('pared1/FOTO9_1_.png');"></div>
        <div class="mural-item item-f9-2" style="background-image: url('pared1/FOTO9_2_.png');"></div>
        <div class="mural-item item-f9-3" style="background-image: url('pared1/FOTO9_3_.png');"></div>
        <div class="mural-item item-f9-4" style="background-image: url('pared1/FOTO9_4_.png');"></div>

        <div class="mural-item item-6 jersey-frame" style="background-image: url('pared1/Camiseta4.png');"><span>[Camiseta Blanca]</span></div>

        <div class="mural-item item-9" style="background-image: url('pared1/foto3.png');"><span>[Foto Equipo]</span></div>
        <div class="mural-item item-10" style="background-image: url('pared1/FOTO4.png');"><span>[Jugador]</span></div>
        <div class="mural-item item-11" style="background-image: url('pared1/FOTO10.png');"><span>[Edificio]</span></div>
    </div>
</div>

<div class="modal" id="imageModal">
    <span class="close-modal" id="closeModal">&times;</span>
    <img class="modal-content" id="modalImage">
</div>

<script>
    // --- LÓGICA DEL MODAL INTERACTIVO ---

    const grid = document.getElementById('muralGrid');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeBtn = document.getElementById('closeModal');

    // Añadir evento de clic a todo el mural
    grid.addEventListener('click', function(e) {
        // Encontrar el elemento 'mural-item' más cercano al clic (por si se clica en el texto)
        const item = e.target.closest('.mural-item');
        
        if (item) {
            // Obtener la URL de la imagen de fondo
            const bgImage = window.getComputedStyle(item).backgroundImage;
            
            // Limpiar la URL (quitar 'url("...")')
            const imageUrl = bgImage.replace(/^url\(['"](.+)['"]\)$/, '$1');
            
            // Si hay una imagen (y no es el texto de marcador)
            if (imageUrl && imageUrl !== 'none' && !imageUrl.includes('undefined')) {
                modal.classList.add('show');
                modalImg.src = imageUrl;
            } else {
                console.log("No hay imagen real definida para este elemento.");
                // Opcional: mostrar un mensaje o simplemente no hacer nada.
            }
        }
    });

    // Cerrar el modal al hacer clic en la 'X'
    closeBtn.addEventListener('click', function() {
        modal.classList.remove('show');
    });

    // Cerrar el modal al hacer clic fuera de la imagen
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            modal.classList.remove('show');
        }
    });

    // Cerrar el modal al pulsar la tecla ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('show')) {
            modal.classList.remove('show');
        }
    });
</script>

</body>
</html>en
